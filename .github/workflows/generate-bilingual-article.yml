name: Generate Bilingual Article

on:
  workflow_dispatch:
    inputs:
      topic:
        description: Article topic
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate article JSON
        env:
          TOPIC: ${{ inputs.topic }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: npm run article:generate -- "$TOPIC"

      - name: Read generated article metadata
        run: |
          ARTICLE_JSON="$(find generated-articles -maxdepth 1 -type f -name '*.json' -print -quit)"
          test -n "$ARTICLE_JSON"
          ARTICLE_JSON="$ARTICLE_JSON" node <<'NODE' >> "$GITHUB_ENV"
          const fs = require("fs");
          const path = require("path");

          const articlePath = path.resolve(process.env.ARTICLE_JSON);
          const article = JSON.parse(fs.readFileSync(articlePath, "utf8"));
          const clean = (value) => String(value ?? "").replace(/[\r\n]+/g, " ").trim();

          if (!clean(article.slug) || !clean(article.fa?.title) || !clean(article.en?.title)) {
            throw new Error("Generated article metadata is incomplete.");
          }

          console.log(`ARTICLE_JSON=${articlePath}`);
          console.log(`SLUG=${clean(article.slug)}`);
          console.log(`FA_TITLE=${clean(article.fa.title)}`);
          console.log(`EN_TITLE=${clean(article.en.title)}`);
          console.log(`ARTICLE_IMAGES_DIR=${path.join(path.dirname(articlePath), `${clean(article.slug)}-images`)}`);
          NODE
          IMAGE_DIRECTORY="$(dirname "$ARTICLE_JSON")/$(basename "$ARTICLE_JSON" .json)-images"
          test -f "$IMAGE_DIRECTORY/cover.png"
          test -s "$IMAGE_DIRECTORY/cover.png"

      - name: Add article to the project
        run: npm run article:add -- "$ARTICLE_JSON" --images "$ARTICLE_IMAGES_DIR"

      - name: Build project
        run: npm run build

      - name: Create article branch and commit
        run: |
          BRANCH="article/$SLUG"
          git switch -c "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/articles.ts "src/assets/images/articles/$SLUG"
          git diff --cached --quiet && { echo "No article changes were staged."; exit 1; }
          git commit -m "content: add article $SLUG"
          git push origin "$BRANCH"
          echo "ARTICLE_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > pr-body.md <<EOF
          ## Article details

          - Persian title: ${FA_TITLE}
          - English title: ${EN_TITLE}
          - Slug: ${SLUG}
          - Article path: src/content/articles.ts
          - Build: successful (npm run build)
          EOF
          PR_URL="$(gh pr create --base main --head "$ARTICLE_BRANCH" --title "Add article: $EN_TITLE" --body-file pr-body.md)"
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"

      - name: Upload generated article and cover
        uses: actions/upload-artifact@v4
        with:
          name: bilingual-article-json
          path: generated-articles/
          if-no-files-found: error

      - name: Add pull request to summary
        run: |
          echo "## Generated bilingual article pull request" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "[Open pull request]($PR_URL)" >> "$GITHUB_STEP_SUMMARY"
